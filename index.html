<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Expense Tracker</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ExpensePro">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 🌐 Header -->
    <div class="header">
        <h2 id="appTitle">💰 နေ့စဉ်အသုံးစရိတ် မှတ်တမ်း</h2>
        <div class="lang-wrapper">
            <span>🌐</span>
            <select id="langSelect" onchange="changeLanguage()">
                <option value="mm">MM</option>
                <option value="en">EN</option>
                <option value="th">TH</option>
            </select>
        </div>
    </div>

    <div class="container">
        <!-- Input Form -->
        <div class="form-card">
            <h3 id="formTitle">အချက်အလက်အသစ်ထည့်ရန်</h3>
            <div class="input-group">
                <label id="labelTitle">အသုံးပြုသည့် အကြောင်းအရာ:</label>
                <input type="text" id="titleInput" placeholder="ဥပမာ - စျေးဝယ်ခြင်း">
            </div>
            
            <div class="input-group">
                <label id="labelDate">ရက်စွဲရွေးချယ်ရန်:</label>
                <input type="date" id="dateInput">
            </div>
            
            <div class="input-group">
                <label id="labelAmount">ကုန်ကျငွေ ပမာဏ:</label>
                <div class="amount-row">
                    <input type="text" id="amountInput" placeholder="ဥပမာ - 100k သို့မဟုတ် 50000">
                    <select id="currencyInput">
                        <!-- 🇲🇲 မူလငွေကြေးများနှင့် အသစ်တိုးလာသော အာရှငွေကြေးစာရင်းအပြည့်အစုံ -->
                        <option value="Ks">🇲🇲 Ks (MMK)</option>
                        <option value="Baht">🇹🇭 Baht (THB)</option>
                        <option value="USD">🇺🇸 USD</option>
                        <option value="SGD">🇸🇬 SGD</option>
                        <option value="EUR">🇪🇺 EUR</option>
                        <option value="JPY">🇯🇵 JPY (Yen)</option>
                        <option value="MYR">🇲🇾 MYR (Ringgit)</option>
                        <option value="KRW">🇰🇷 KRW (Won)</option>
                        <option value="CNY">🇨🇳 CNY (Yuan)</option>
                        <option value="VND">🇻🇳 VND (Dong)</option>
                        <option value="IDR">🇮🇩 IDR (Rupiah)</option>
                        <option value="PHP">🇵🇭 PHP (Peso)</option>
                        <option value="KHR">🇰🇭 KHR (Riel)</option>
                        <option value="LAK">🇱🇦 LAK (Kip)</option>
                        <option value="INR">🇮🇳 INR (Rupee)</option>
                        <option value="LKR">🇱🇰 LKR (Rupee)</option>
                    </select>
                </div>
            </div>
            <button id="addBtn" onclick="addExpense()">➕ အသစ်ထည့်မည် (Add)</button>
        </div>

        <!-- History Filter -->
        <div class="form-card" style="background: #eff6ff; border: 1px solid #bfdbfe;">
            <h3 id="filterTitle">📊 စာရင်းများ ပြန်လည်ကြည့်ရှုရန် (History)</h3>
            <div class="amount-row">
                <div style="flex: 1;">
                    <label id="labelFilterMode" style="font-weight:bold; font-size:14px;">ကြည့်ရှုမည့် ပုံစံ:</label>
                    <select id="filterType" onchange="toggleFilterInputs()">
                        <option value="all" id="optAll">စာရင်းအားလုံးကြည့်မည်</option>
                        <option value="date" id="optDate">ရက်စွဲအလိုက်ကြည့်မည်</option>
                        <option value="month" id="optMonth">လအလိုက် (လချုပ်) ကြည့်မည်</option>
                    </select>
                </div>
                
                <div id="filterDateArea" style="flex: 1; display: none;">
                    <label id="labelFilterDate" style="font-weight:bold; font-size:14px;">ရက်စွဲရွေးရန်:</label>
                    <input type="date" id="filterDate" onchange="renderExpenses()">
                </div>

                <div id="filterMonthArea" style="flex: 1; display: none;">
                    <label id="labelFilterMonth" style="font-weight:bold; font-size:14px;">လရွေးရန်:</label>
                    <input type="month" id="filterMonth" onchange="renderExpenses()">
                </div>
            </div>
        </div>

        <!-- Table View -->
        <div class="table-responsive">
            <table id="expenseTable">
                <thead>
                    <tr>
                        <th id="thIndex">အမှတ်စဉ်</th>
                        <th id="thDate">ရက်စွဲ</th>
                        <th id="thTitle">အကြောင်းအရာ</th>
                        <th id="thAmount">ကုန်ကျငွေ</th>
                    </tr>
                </thead>
                <tbody id="expenseList"></tbody>
            </table>
        </div>

        <!-- Total Section -->
        <h3 id="totalHeader">📊 စုစုပေါင်းကုန်ကျငွေစာရင်းများ -</h3>
        <div class="total-card" id="totalArea">
            <!-- Totals will appear here dynamically -->
        </div>
    </div>

    <!-- Floating Button Group -->
    <div id="actionButtonGroup">
        <button id="floatingEditBtn" onclick="editSelectedExpense()">✏️ ပြင်ဆင်ရန် (Edit)</button>
        <button id="floatingDeleteBtn" onclick="deleteSelectedExpense()">🗑️ ဖျက်ရန် (Delete)</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
